name: ohmsprint
description: OhmSprint Energy Monitor
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  fl_chart: ^0.68.0
  web_socket_channel: ^3.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  json_annotation: ^4.9.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  pdf: ^3.11.0
  csv: ^6.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  multicast_dns: ^0.3.2+6
  http: ^1.2.1
  flutter_local_notifications: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk/SpaceGrotesk-Variable.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk/SpaceGrotesk-Variable.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk/SpaceGrotesk-Variable.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-Variable.ttf
          weight: 600
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Bold.ttf
          weight: 700
